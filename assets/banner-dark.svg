<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="700" height="280">
  <style>
    .char{animation:jump .7s ease-in-out infinite}
    .left-arm{animation:wl .6s ease-in-out infinite;transform-box:fill-box;transform-origin:100% 50%}
    .right-arm{animation:wr .6s ease-in-out infinite;transform-box:fill-box;transform-origin:0% 50%}
    .left-leg{animation:step .8s ease-in-out infinite}
    .right-leg{animation:step .8s ease-in-out infinite .4s}
    @keyframes jump{0%,100%{transform:translateY(0)}40%{transform:translateY(-80px)}55%{transform:translateY(-85px)}85%{transform:translateY(-14px)}}
    @keyframes wl{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-25deg)}}
    @keyframes wr{0%,100%{transform:rotate(0deg)}50%{transform:rotate(25deg)}}
    @keyframes step{0%,100%{transform:translateY(0)}50%{transform:translateY(-17px)}}
    @keyframes np{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}
    .np{animation:np 2s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 50%}
    @keyframes glow{
      0%{transform:translate(0,0);fill:#2DA44E;opacity:.55}
      16%{transform:translate(140px,0);fill:#2DA44E;opacity:.55}
      17%{transform:translate(149px,0);fill:#2F81F7;opacity:.6}
      22%{transform:translate(188px,0);fill:#2F81F7;opacity:.6}
      27%{transform:translate(230px,-38px);fill:#2F81F7;opacity:.6}
      29%{transform:translate(243px,-48px);fill:#8957E5;opacity:.65}
      36%{transform:translate(276px,-76px);fill:#8957E5;opacity:.65}
      53%{transform:translate(453px,-76px);fill:#8957E5;opacity:.65}
      62%{transform:translate(514px,-19px);fill:#8957E5;opacity:.65}
      63%{transform:translate(521px,-13px);fill:#2F81F7;opacity:.6}
      66%{transform:translate(534px,0);fill:#2F81F7;opacity:.6}
      67%{transform:translate(540px,0);fill:#2DA44E;opacity:.55}
      76%{transform:translate(608px,0);fill:#2DA44E;opacity:.55}
      77%{transform:translate(614px,6px);fill:#DA3633;opacity:.65}
      84%{transform:translate(633px,54px);fill:#DA3633;opacity:.65}
      89%{transform:translate(658px,21px);fill:#DA3633;opacity:.6}
      90%{transform:translate(664px,13px);fill:#2F81F7;opacity:.6}
      92%{transform:translate(674px,0);fill:#2F81F7;opacity:.6}
      93%{transform:translate(680px,0);fill:#2DA44E;opacity:.55}
      100%{transform:translate(728px,0);fill:#2DA44E;opacity:0}
    }
    .branch-glow{animation:glow 5s linear infinite}
    @keyframes twinkle{0%,100%{opacity:.08}50%{opacity:.5}}
    .s{animation:twinkle 4s ease-in-out infinite}
  </style>

  <!-- Background: Starfield -->
  <rect width="800" height="320" fill="#010409"/>
  <!-- Stars — top-left area -->
  <circle cx="45" cy="25" r="0.8" fill="#c9d1d9" class="s" style="animation-delay:0s"/>
  <circle cx="110" cy="15" r="0.6" fill="#c9d1d9" class="s" style="animation-delay:1.2s"/>
  <circle cx="180" cy="55" r="0.7" fill="#c9d1d9" class="s" style="animation-delay:2.5s"/>
