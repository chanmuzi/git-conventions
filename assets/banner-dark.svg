  <circle cx="680" cy="45" r="0.5" fill="#c9d1d9" class="s" style="animation-delay:0.9s"/>
  <circle cx="740" cy="15" r="0.8" fill="#c9d1d9" class="s" style="animation-delay:3.5s"/>
  <circle cx="770" cy="55" r="0.6" fill="#c9d1d9" class="s" style="animation-delay:1.4s"/>
