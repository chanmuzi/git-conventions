  <rect x="56" y="215" width="40" height="16" fill="rgba(46,160,67,.12)" rx="4"/>
  <text x="76" y="227" font-family="ui-monospace,monospace" font-size="9" fill="#3fb950" text-anchor="middle">main</text>
  <rect x="325" y="97" width="54" height="16" fill="rgba(137,87,229,.12)" rx="4"/>
