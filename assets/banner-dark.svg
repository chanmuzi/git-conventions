  <circle cx="730" cy="250" r="0.5" fill="#c9d1d9" class="s" style="animation-delay:2.4s"/>
  <circle cx="760" cy="280" r="0.7" fill="#c9d1d9" class="s" style="animation-delay:0.7s"/>
