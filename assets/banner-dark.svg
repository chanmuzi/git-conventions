  <circle cx="80" cy="70" r="0.6" fill="#c9d1d9" class="s" style="animation-delay:1.5s"/>
  <circle cx="340" cy="50" r="0.8" fill="#c9d1d9" class="s" style="animation-delay:3.6s"/>
  <!-- Stars — bottom area -->
